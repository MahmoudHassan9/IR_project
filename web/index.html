<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mini Search Engine – IR Final Project">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mini Search Engine">
  <title>Mini Search Engine</title>
  <link rel="manifest" href="manifest.json">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png">

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F5F5F5;
      font-family: Roboto, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #1565C0;
    }
    #loading svg {
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="20" stroke="#1565C0" stroke-width="4" stroke-dasharray="90 30" />
    </svg>
    <span style="font-size:18px; font-weight:600;">Mini Search Engine</span>
    <span style="font-size:14px; color:#666;">Loading…</span>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
